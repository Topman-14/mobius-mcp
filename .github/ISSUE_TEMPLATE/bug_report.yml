name: Bug report
description: Report a problem with Mobius MCP
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: e.g. Chrome 126, Edge 126
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste console output, exported diagnostics, or drag in screenshots.
    validations:
      required: false
