name: Release mobius-mcp

on:
  push:
    tags:
      - "mobius-mcp@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Tag-push events aren't scoped to a branch, so a tag pushed from any ref would
      # otherwise trigger a publish. Require the tagged commit to already be on main.
      - name: Verify tag is on main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "Tag ${{ github.ref_name }} (${{ github.sha }}) is not an ancestor of main. Refusing to publish." >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#mobius-mcp@}"
          PKG_VERSION=$(node -p "require('./apps/mcp-server/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match apps/mcp-server/package.json version ($PKG_VERSION)." >&2
            exit 1
          fi

      - run: npm publish --workspace=apps/mcp-server --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
