name: Release mobius-mcp

# Manual/escape-hatch path — push a "mobius-mcp@X.Y.Z" tag yourself and this publishes
# it. The recommended path is tag-mcp-server.yml: bump apps/mcp-server/package.json's
# version in your PR and this fires automatically once it's merged to main.
on:
  push:
    tags:
      - "mobius-mcp@*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Tag-push events aren't scoped to a branch, so a tag pushed from any ref would
      # otherwise trigger a publish. Require the tagged commit to already be on main.
      - name: Verify tag is on main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "Tag ${{ github.ref_name }} (${{ github.sha }}) is not an ancestor of main. Refusing to publish." >&2
            exit 1
          fi

  publish:
    needs: verify
    uses: ./.github/workflows/publish-mcp-server.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
    permissions:
      contents: read
      id-token: write
